services:
  # ─── POSTGRES ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15
    container_name: erp_hurtos_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: empresarial
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d empresarial"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── BACKEND NODE.JS (CORE BRIDGE) ──────────────────────────────────────────
  backend:
    build:
      context: ../ms-gestion-empresarial
      dockerfile: Dockerfile
    container_name: erp_hurtos_backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: "postgresql://postgres:123@postgres:5432/empresarial?schema=public"
      JWT_SECRET: "super-secret-key-empresarial-123"
      JWT_EXPIRES_IN: "8h"
      ANALYSIS_SERVICE_URL: "http://electrical-analysis-ms:8000"
      GROQ_API_KEY: "tu_groq_api_key_aqui"
    ports:
      - "4000:4000"
    volumes:
      - exports_vol:/tmp/exports
    restart: unless-stopped

  # ─── ELECTRICAL ANALYSIS MS (PYTHON) ─────────────────────────────────────────
  electrical-analysis-ms:
    build:
      context: ../electrical-analysis-ms
      dockerfile: Dockerfile
    container_name: erp_hurtos_analysis
    environment:
      OPENAI_API_KEY: "tu_openai_api_key_aqui"
      OPENAI_MODEL: "gpt-4o-mini"
    ports:
      - "8000:8000"
    restart: unless-stopped

  # ─── FRONTEND ANGULAR ─────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontendWeb
      dockerfile: Dockerfile
    container_name: erp_hurtos_frontend
    depends_on:
      - backend
    ports:
      - "4200:80"
    restart: unless-stopped

volumes:
  pg_data:
  exports_vol:
